# ===== PostgreSQL Configuration =====
# Values are read from environment variables. See .env.example for setup.
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ===== Cloudflare R2 (uncomment when ready) =====
# r2.account-id=${R2_ACCOUNT_ID}
# r2.access-key=${R2_ACCESS_KEY}
# r2.secret-key=${R2_SECRET_KEY}
# r2.bucket-name=${R2_BUCKET_NAME}

# ===== Gemini LLM =====
gemini.api-key=${GEMINI_API_KEY}

# ===== File Upload =====
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
